name: Build and Deploy APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (如 1.0.1)'
        required: true
        default: '1.0.1'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Extract version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/v}"
          fi
          # 同步 pubspec.yaml 版本号到 tag 版本
          sed -i "s/^version: .*/version: ${VERSION}+1/" pubspec.yaml
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "构建版本: $VERSION"

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Prepare APK and version info
        run: |
          mkdir -p deploy
          cp build/app/outputs/flutter-apk/app-release.apk deploy/echo-latest.apk
          cat > deploy/version.json << EOF
          {
            "latestVersion": "${{ steps.version.outputs.version }}",
            "minVersion": "${{ steps.version.outputs.version }}",
            "downloadUrl": "https://api.wudiclaw.cloud/app/echo-latest.apk",
            "releaseNotes": "修复已知问题，优化使用体验"
          }
          EOF

      - name: Upload APK and version info via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          source: "deploy/echo-latest.apk,deploy/version.json"
          target: "/var/www/app/"
          strip_components: 1
