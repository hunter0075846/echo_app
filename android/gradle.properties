org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError -XX:ReservedCodeCacheSize=512m
android.useAndroidX=true
android.enableJetifier=true

# Gradle 缓存使用各平台默认路径，无需手动指定

# 使用国内镜像（如需代理请取消下面注释并填写代理地址）
# systemProp.http.proxyHost=127.0.0.1
# systemProp.http.proxyPort=7890
# systemProp.https.proxyHost=127.0.0.1
# systemProp.https.proxyPort=7890

kotlin.incremental=false
kotlin.compiler.allWarningsAsErrors=false
kotlin.daemon.jvm.options=-Xmx2g
